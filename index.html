<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم علاقات حب</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>لوحة تحكم علاقات حب ❤️</h1>
            <p>مركز الراشد - نظام إدارة كروت الـ iCloud</p>
        </header>

        <button id="generateBtn" onclick="handleGenerate()">توليد كارت جديد +</button>

        <div id="printSection" class="print-card" style="display: none;">
            <div id="qrcode"></div>
            <div class="print-btns">
                <button onclick="window.print()" class="btn-print">طباعة الباركود 🖨️</button>
                <button onclick="closePrint()" class="btn-close">إغلاق</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الايميل</th>
                        <th>المواليد</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
